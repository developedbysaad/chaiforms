<!doctype html>
<!--
  ChaiForm template — Newsletter signup
  ────────────────────────────────────────────────────────────────────────
  HOW TO USE THIS FILE
  1. Get an access key: sign up at https://chaiforms.developedbysaad.com →
     Dashboard → Endpoint Forms → New. Enter a name + your website, then
     VERIFY the email we send you (submissions won't deliver until you do).
  2. Replace YOUR_ACCESS_KEY below with the key from your dashboard.
  3. (Self-hosting ChaiForm? Change the form's `action` to your own /submit URL.)
  4. Drop this file on any host — Netlify, GitHub Pages, your own server.
  5. Signups land in your inbox AND your ChaiForm dashboard. Done.
  ────────────────────────────────────────────────────────────────────────
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subscribe</title>
    <style>
      :root { --bg: #0f1115; --card: #171a21; --ink: #f4f1ea; --muted: #9aa0ab; --accent: #e0a32e; --line: #2a2f3a; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px 16px;
        background: var(--bg); color: var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .card { width: 100%; max-width: 440px; background: var(--card); border: 1px solid var(--line);
        border-radius: 18px; padding: 36px; text-align: center; }
      h1 { font-size: 1.8rem; margin: 0 0 8px; }
      p.lede { margin: 0 0 26px; color: var(--muted); }
      .row { display: flex; gap: 8px; }
      input[type="email"] { flex: 1; padding: 13px 15px; border: 1px solid var(--line); border-radius: 11px;
        font: inherit; background: #0f1218; color: var(--ink); }
      input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
      button { padding: 13px 20px; border: 0; border-radius: 11px; background: var(--accent); color: #1a1205;
        font: inherit; font-weight: 700; cursor: pointer; white-space: nowrap; }
      button:disabled { opacity: 0.6; cursor: progress; }
      .hp { position: absolute; left: -9999px; opacity: 0; height: 0; }
      .ok, .err { display: none; margin-top: 18px; font-size: 0.92rem; }
      .ok { color: #6ee7a0; } .err { color: #f08a8a; }
      .note { margin-top: 22px; font-size: 0.78rem; color: var(--muted); }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Join the list 📬</h1>
      <p class="lede">No spam. Just the occasional good thing.</p>

      <form id="chaiform" action="https://chaiforms.developedbysaad.com/submit" method="POST">
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY" />
        <input type="hidden" name="subject" value="New newsletter subscriber" />
        <input class="hp" type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" />

        <div class="row">
          <input name="email" type="email" placeholder="you@example.com" required />
          <button type="submit">Subscribe</button>
        </div>
        <div class="ok" id="ok">You're in. Welcome aboard! ☕</div>
        <div class="err" id="err">Something went wrong. Please try again.</div>
      </form>

      <p class="note">Powered by <a href="https://chaiforms.developedbysaad.com">ChaiForm</a></p>
    </main>

    <script>
      const form = document.getElementById("chaiform");
      const ok = document.getElementById("ok");
      const err = document.getElementById("err");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        ok.style.display = err.style.display = "none";
        const btn = form.querySelector("button");
        btn.disabled = true;
        try {
          const res = await fetch(form.action, { method: "POST", headers: { Accept: "application/json" }, body: new FormData(form) });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.success !== false) { form.reset(); ok.style.display = "block"; }
          else { err.textContent = data.message || "Something went wrong. Please try again."; err.style.display = "block"; }
        } catch (_) { err.style.display = "block"; }
        finally { btn.disabled = false; }
      });
    </script>
  </body>
</html>
