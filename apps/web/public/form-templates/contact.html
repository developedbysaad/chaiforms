<!doctype html>
<!--
  ChaiForm template — Contact page
  ────────────────────────────────────────────────────────────────────────
  HOW TO USE THIS FILE
  1. Get an access key: sign up at https://chaiforms.developedbysaad.com →
     Dashboard → Endpoint Forms → New. Enter a name + your website, then
     VERIFY the email we send you (submissions won't deliver until you do).
  2. Replace YOUR_ACCESS_KEY below with the key from your dashboard.
  3. (Self-hosting ChaiForm? Change the form's `action` to your own /submit URL.)
  4. Drop this file on any host — Netlify, GitHub Pages, your own server.
  5. Submissions land in your inbox AND your ChaiForm dashboard. Done.
  ────────────────────────────────────────────────────────────────────────
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Get in touch</title>
    <style>
      :root {
        --bg: #fbf5ec;
        --card: #ffffff;
        --ink: #3b2a1a;
        --muted: #7a4818;
        --accent: #b8722e;
        --line: #e5d5bd;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .card {
        width: 100%;
        max-width: 460px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 32px;
        box-shadow: 0 12px 40px -24px rgba(59, 42, 26, 0.5);
      }
      h1 { font-size: 1.7rem; margin: 0 0 6px; }
      p.lede { margin: 0 0 24px; color: var(--muted); }
      label { display: block; font-weight: 600; margin: 16px 0 6px; font-size: 0.9rem; }
      input, textarea {
        width: 100%;
        padding: 11px 13px;
        border: 1px solid var(--line);
        border-radius: 10px;
        font: inherit;
        background: #fff;
        color: var(--ink);
      }
      input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
      textarea { min-height: 120px; resize: vertical; }
      button {
        margin-top: 22px;
        width: 100%;
        padding: 12px;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: progress; }
      .hp { position: absolute; left: -9999px; opacity: 0; height: 0; }
      .note { margin-top: 16px; font-size: 0.8rem; color: var(--muted); text-align: center; }
      .ok, .err { display: none; margin-top: 18px; padding: 12px 14px; border-radius: 10px; font-size: 0.92rem; }
      .ok { background: #e9f6ec; color: #1f6b34; }
      .err { background: #fbeaea; color: #a12626; }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Get in touch ☕</h1>
      <p class="lede">Drop a message and we'll get back to you.</p>

      <form id="chaiform" action="https://chaiforms.developedbysaad.com/submit" method="POST">
        <!-- Replace with your access key from the ChaiForm dashboard -->
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY" />
        <input type="hidden" name="subject" value="New contact form message" />
        <!-- Honeypot: bots fill this, humans never see it. Leave it empty. -->
        <input class="hp" type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" />

        <label for="name">Name</label>
        <input id="name" name="from_name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send message</button>
        <div class="ok" id="ok">Thanks! Your message is on its way. ☕</div>
        <div class="err" id="err">Something went wrong. Please try again.</div>
      </form>

      <p class="note">Powered by <a href="https://chaiforms.developedbysaad.com">ChaiForm</a></p>
    </main>

    <script>
      // Progressive enhancement: submit via fetch so the page shows inline
      // success instead of navigating away. Falls back to a normal POST if JS
      // is disabled (the form still works without this script).
      const form = document.getElementById("chaiform");
      const ok = document.getElementById("ok");
      const err = document.getElementById("err");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        ok.style.display = err.style.display = "none";
        const btn = form.querySelector("button");
        btn.disabled = true;
        try {
          const res = await fetch(form.action, {
            method: "POST",
            headers: { Accept: "application/json" },
            body: new FormData(form),
          });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data.success !== false) {
            form.reset();
            ok.style.display = "block";
          } else {
            err.textContent = data.message || "Something went wrong. Please try again.";
            err.style.display = "block";
          }
        } catch (_) {
          err.style.display = "block";
        } finally {
          btn.disabled = false;
        }
      });
    </script>
      <!-- chaiTailwind — https://www.npmjs.com/package/@developedbysaad/chaitailwind
         This page is also customizable with chai-* utility classes: the script
         below reads them and applies the matching inline styles (no build step).
         e.g. add class="chai-mt-4 chai-text-center chai-text-sm" to any element. -->
    <div class="chai-mt-4 chai-text-center chai-text-xs chai-opacity-60">Customizable with chaiTailwind ☕</div>
    <script src="https://unpkg.com/@developedbysaad/chaitailwind" data-chai-keep-classes="true"></script>
</body>
</html>
